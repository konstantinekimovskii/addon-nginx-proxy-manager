---
name: Deploy

on:
  release:
    types:
      - published

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, amd64]
      fail-fast: false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: proxy-manager
          push: true
          tags: |
            ghcr.io/konstantinekimovskii/${{ matrix.arch }}-addon-nginxproxymanager:${{ github.event.release.tag_name }}
            ghcr.io/konstantinekimovskii/${{ matrix.arch }}-addon-nginxproxymanager:latest
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/base:20.0.4
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            BUILD_NAME=Nginx Proxy Manager
            BUILD_DESCRIPTION=Manage Nginx proxy hosts with a simple, powerful interface
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=${{ github.event.release.tag_name }}
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
