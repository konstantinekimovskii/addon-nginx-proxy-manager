---
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Get NPM version from Dockerfile
        run: |
          NPM_VER=$(grep 'NGINX_PROXY_MANAGER_VERSION=' proxy-manager/Dockerfile | sed 's/.*"\(.*\)".*/\1/')
          echo "NPM_VERSION=${NPM_VER}" >> "$GITHUB_ENV"
          echo "NPM version: ${NPM_VER}"

      - name: Validate patches
        run: python3 proxy-manager/scripts/patch-npm.py ${{ env.NPM_VERSION }}

      - name: Validate config.yaml
        run: |
          python3 -c "
          import re
          cfg = open('proxy-manager/config.yaml').read()
          required = ['name:', 'version:', 'slug:', 'description:', 'arch:', 'startup:']
          for key in required:
              assert key in cfg, f'Missing: {key}'
          v = re.search(r'version:\s*(\S+)', cfg, re.M)
          assert v and 'v' not in v.group(1), f'Version must not have v prefix'
          print(f'Config OK: version={v.group(1)}')
          "

  build:
    name: Build ${{ matrix.arch }}
    needs: [validate]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64
      fail-fast: false
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: proxy-manager
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            BUILD_FROM=ghcr.io/hassio-addons/base:21.0.0
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            BUILD_NAME=Nginx Proxy Manager
            BUILD_DESCRIPTION=Manage Nginx proxy hosts with a simple, powerful interface
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=dev
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
